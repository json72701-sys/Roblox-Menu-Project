name: Build iOS Executor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-shipping'

      - name: Compile Dylib
        run: |
          # Define the SDK path for iOS
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # Compile all .cpp (ImGui/Logic) and .mm (UIKit/Main) files
          # -I. tells the compiler to look for headers in the current directory
          # -framework flags link the necessary iOS graphics and UI libraries
          clang++ -dynamiclib -arch arm64 \
            -isysroot "$SDK_PATH" \
            -miphoneos-version-min=14.0 \
            -I. \
            -I./imgui \
            -framework UIKit \
            -framework Foundation \
            -framework Metal \
            -framework MetalKit \
            -framework QuartzCore \
            -std=c++17 \
            -o MyExecutor.dylib \
            *.mm *.cpp imgui/*.cpp 2>/dev/null || clang++ -dynamiclib -arch arm64 -isysroot "$SDK_PATH" -miphoneos-version-min=14.0 -I. -framework UIKit -framework Foundation -framework Metal -framework MetalKit -framework QuartzCore -std=c++17 -o MyExecutor.dylib *.mm *.cpp

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Executor-Dylib
          path: MyExecutor.dylib
