name: Build iOS Executor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile Dylib
        run: |
          # Use the default SDK path available on the runner
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # Compiling with standard flags for iOS arm64
          clang++ -dynamiclib -arch arm64 \
            -isysroot "$SDK_PATH" \
            -miphoneos-version-min=14.0 \
            -I. \
            -I./imgui \
            -framework UIKit \
            -framework Foundation \
            -framework Metal \
            -framework MetalKit \
            -framework QuartzCore \
            -std=c++17 \
            -o MyExecutor.dylib \
            *.mm *.cpp imgui/*.cpp 2>/dev/null || clang++ -dynamiclib -arch arm64 -isysroot "$SDK_PATH" -miphoneos-version-min=14.0 -I. -framework UIKit -framework Foundation -framework Metal -framework MetalKit -framework QuartzCore -std=c++17 -o MyExecutor.dylib *.mm *.cpp

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Executor-Dylib
          path: MyExecutor.dylib
